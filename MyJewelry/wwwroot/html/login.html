<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Login - Jewelry App</title>
    <link rel="stylesheet" href="../css/site.css">
</head>
<body>
    <div class="container" style="max-width: 400px; text-align: center;">
        <h1>Welcome To Our Jewelry App</h1>
        <p>Please enter your credentials</p>
        <form onsubmit="getUserDetails(event)">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="userName" placeholder="User Name" required>
                <input type="text" id="userId" placeholder="Password (Your ID)" required>
                <input type="submit" value="Login Now">
            </div>
        </form>
        <div id="login-msg" style="margin-top: 15px; color: var(--accent);"></div>
    </div>
    <script src="../js/login.js"></script>
</body>
</html>
