<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>My Profile & User Management</title>
    <link rel="stylesheet" href="../css/site.css">
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <button class="btn-nav" onclick="window.location.href='../index.html'">Back to Jewelry</button>
            <button class="btn-nav" onclick="logout()">Logout</button>
        </div>

        <section class="form-section">
            <h2 id="profile-title">My Personal Profile</h2>
            <form id="profile-form" onsubmit="updateMyProfile(event)">
                <label>My ID:</label>
                <input type="text" id="my-id" readonly style="background: #eee; margin-bottom: 10px;"><br>
                <div style="margin-bottom: 10px;">
                    <label>Name:</label><br>
                    <input type="text" id="my-name" required>
                </div>
                <div style="margin-bottom: 10px;">
                    <label>New Password:</label><br>
                    <input type="password" id="my-password" placeholder="Leave blank to keep current">
                </div>
                <button type="submit">Save Changes</button>
            </form>
        </section>

        <div id="admin-section" class="hidden">
            <hr>
            
            <section class="form-section" style="background: rgba(0,0,0,0.05);">
                <h3>Add New User</h3>
                <form id="add-user-form" onsubmit="addUser(event)">
                    <input type="text" id="add-user-name" placeholder="User Name" required>
                    <input type="password" id="add-user-password" placeholder="Password" required>
                    <select id="add-user-role">
                        <option value="User">User</option>
                        <option value="Admin">Admin</option>
                    </select>
                    <button type="submit" class="btn-edit">Create User</button>
                </form>
            </section>

            <h1>Admin: All Users</h1>
            <table id="user-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-list"></tbody>
            </table>
        </div>
    </div>

    <div id="toast" class="hidden"></div>

    <script src="../js/users.js"></script>
    <script>
        loadProfilePage();
    </script>
</body>
</html>
